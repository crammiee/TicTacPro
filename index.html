<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
</head>
<body>

<div class="container">

  <header>
    <h1>TIC TAC TOE</h1>
    <p>Customizable &bull; 2 Player &bull; vs AI</p>
  </header>

  <div class="setup-panel">
    <div class="setup-group">
      <label>Mode</label>
      <div class="mode-toggle">
        <button id="mode2p" class="active">2 Player</button>
        <button id="modeAI">vs Computer</button>
      </div>
    </div>

    <div class="setup-group">
      <label>Columns</label>
      <input type="number" id="colsInput" value="3" min="3" max="20">
    </div>

    <div class="setup-group">
      <label>Rows</label>
      <input type="number" id="rowsInput" value="3" min="3" max="20">
    </div>

    <div class="setup-group" id="winGroup">
      <label>Win Length</label>
      <input type="number" id="winInput" value="3" min="3" max="10">
    </div>

    <div class="setup-group" id="aiGroup" style="display:none">
      <label>AI Difficulty</label>
      <select id="diffSelect">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard" selected>Hard (Unbeatable)</option>
      </select>
    </div>

    <div class="setup-group" id="sideGroup" style="display:none">
      <label>You Play As</label>
      <select id="sideSelect">
        <option value="X">X (First)</option>
        <option value="O">O (Second)</option>
      </select>
    </div>

    <button id="startBtn">START</button>
  </div>

  <div class="info-row">
    <span class="tag" id="modeTag">2 PLAYER</span>
    <span class="tag" id="sizeTag">3 × 3</span>
    <span class="tag" id="winTag">3 IN A ROW</span>
    <div class="thinking" id="thinkingIndicator">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <span>AI THINKING</span>
    </div>
  </div>

  <div class="status-bar">
    <div class="turn-indicator">
      <div class="player-badge x active-x" id="badgeX">
        <span class="sym x">X</span>
        <span id="p1name">Player 1</span>
      </div>
      <span style="color:var(--text-dim)">vs</span>
      <div class="player-badge o" id="badgeO">
        <span class="sym o">O</span>
        <span id="p2name">Player 2</span>
      </div>
    </div>
    <div class="score-display">
      <div class="score-item"><span class="val" id="scoreX">0</span>X WINS</div>
      <div class="score-item"><span class="val" id="scoreDraw">0</span>DRAWS</div>
      <div class="score-item"><span class="val" id="scoreO">0</span>O WINS</div>
    </div>
  </div>

  <div id="gameMessage"></div>

  <div class="board-wrapper">
    <div id="board"></div>
  </div>

  <div class="controls">
    <button class="btn primary" id="newRoundBtn">New Round</button>
    <button class="btn" id="resetAllBtn">Reset All</button>
  </div>

</div>

<script type="module" src="/src/main.ts"></script>

</body>
</html>
